<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mundial 2026 - Calendario y Grupos</title>
  <style>
    :root{
      --bg:#0f172a;
      --card:#111827;
      --card2:#1f2937;
      --text:#e5e7eb;
      --muted:#9ca3af;
      --accent:#22c55e;
      --danger:#ef4444;
      --line:#334155;
      --chip:#2563eb;
      --warn:#f59e0b;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:linear-gradient(180deg,#020617,#0f172a 40%,#111827);
      color:var(--text);
    }
    header{
      padding:24px 16px 12px;
      border-bottom:1px solid var(--line);
      background:rgba(15,23,42,.9);
      position:sticky;
      top:0;
      z-index:10;
      backdrop-filter:blur(8px);
    }
    .wrap{max-width:1400px;margin:0 auto;padding:0 16px 32px}
    h1{margin:0 0 6px;font-size:28px}
    p.sub{margin:0;color:var(--muted)}
    nav{
      display:flex;flex-wrap:wrap;gap:8px;margin-top:14px
    }
    nav a{
      color:white;text-decoration:none;background:var(--card2);
      border:1px solid var(--line);padding:8px 12px;border-radius:999px;
      font-size:14px
    }
    section{
      margin-top:22px;
      background:rgba(17,24,39,.85);
      border:1px solid var(--line);
      border-radius:16px;
      padding:16px;
    }
    h2{margin:0 0 14px;font-size:22px}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
      gap:14px;
    }
    .group{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:14px;
      overflow:hidden;
    }
    .group h3{
      margin:0;
      padding:12px 14px;
      background:#0b1220;
      border-bottom:1px solid var(--line);
      font-size:18px;
    }
    .team-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:10px 14px;border-bottom:1px solid rgba(51,65,85,.6);
      gap:10px;
    }
    .team-row:last-child{border-bottom:none}
    .team-name{font-weight:600}
    .pts{color:#86efac;font-weight:700}
    .muted{color:var(--muted);font-size:13px}
    .match{
      background:var(--card2);
      border:1px solid var(--line);
      border-radius:14px;
      padding:12px;
      margin-bottom:12px;
    }
    .match-top{
      display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap;
      margin-bottom:10px
    }
    .badge{
      display:inline-block;
      padding:4px 8px;
      border-radius:999px;
      background:rgba(37,99,235,.18);
      color:#bfdbfe;
      font-size:12px;
      border:1px solid rgba(59,130,246,.25)
    }
    .teams{
      display:grid;
      grid-template-columns:1fr auto 1fr;
      gap:10px;
      align-items:center;
    }
    .vs{text-align:center;color:var(--muted);font-weight:700}
    .team-box{
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:10px;
      padding:10px;
    }
    .team-box strong{display:block}
    .input-row{
      display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:10px
    }
    input[type="number"]{
      width:70px;background:#0b1220;color:var(--text);
      border:1px solid var(--line);border-radius:8px;padding:8px 10px;
      font-size:16px
    }
    button{
      border:none;border-radius:8px;padding:9px 12px;
      cursor:pointer;font-weight:700
    }
    .ok{background:var(--accent);color:#052e16}
    .del{background:var(--danger);color:white}
    .edit{background:var(--warn);color:#422006}
    .small{font-size:13px;color:var(--muted)}
    details{
      margin-top:10px;
      background:#0b1220;
      border:1px solid var(--line);
      border-radius:10px;
      padding:8px 10px;
    }
    summary{cursor:pointer;font-weight:700}
    .toolbar{
      display:flex;gap:10px;flex-wrap:wrap;margin:10px 0 0
    }
    .toolbar button{background:#334155;color:white}
    .status{
      margin-top:8px;
      font-size:13px;
      color:#cbd5e1;
    }
    @media (max-width:700px){
      .teams{grid-template-columns:1fr}
      .vs{padding:4px 0}
    }
  </style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>Mundial 2026</h1>
    <p class="sub">Calendario, grupos, resultados manuales y clasificación automática.</p>
    <nav id="nav"></nav>
  </div>
</header>

<div class="wrap">
  <section id="grupos">
    <h2>Grupos</h2>
    <div class="grid" id="groups"></div>
  </section>

  <section id="calendario">
    <h2>Calendario completo</h2>
    <div class="toolbar">
      <button onclick="resetAll()">Borrar todos los resultados</button>
      <button onclick="saveData()">Guardar ahora</button>
    </div>
    <div id="matches"></div>
  </section>

  <section id="clasificacion">
    <h2>Clasificación</h2>
    <div id="standings"></div>
  </section>
</div>

<script>
const groups = {
  A: ["México","Sudáfrica","España","Cabo Verde"],
  B: ["Canadá","Bosnia","Bélgica","Egipto"],
  C: ["Estados Unidos","Paraguay","Arabia Saudí","Uruguay"],
  D: ["Argentina","Austria","Francia","Iraq"],
  E: ["Noruega","Senegal","Jordania","Argelia"],
  F: ["Portugal","Uzbekistán","Inglaterra","Ghana"],
  G: ["Panamá","Croacia","Colombia","Congo"]
};

const matches = [
  {id:1,group:"A",date:"21/06",time:"18:00",home:"España",away:"Arabia Saudí"},
  {id:2,group:"A",date:"22/06",time:"00:00",home:"Uruguay",away:"Cabo Verde"},
  {id:3,group:"A",date:"22/06",time:"03:00",home:"Nueva Zelanda",away:"Egipto"},
  {id:4,group:"A",date:"27/06",time:"02:00",home:"Cabo Verde",away:"Arabia Saudí"},
  {id:5,group:"A",date:"27/06",time:"02:00",home:"Uruguay",away:"España"},
  {id:6,group:"A",date:"27/06",time:"05:00",home:"Egipto",away:"Irán"}
];

const storageKey = "mundial2026_results_v2";
let results = JSON.parse(localStorage.getItem(storageKey) || "{}");

function isGrouped(team){
  return Object.values(groups).some(arr => arr.includes(team));
}

function teamGroup(team){
  return Object.entries(groups).find(([g,arr]) => arr.includes(team))?.[0] || "Sin grupo";
}

function saveData(){
  localStorage.setItem(storageKey, JSON.stringify(results));
  renderAll();
}

function setResult(id){
  const h = document.getElementById(`h-${id}`).value;
  const a = document.getElementById(`a-${id}`).value;
  if(h === "" || a === "") return;
  results[id] = {home:Number(h), away:Number(a)};
  saveData();
}

function clearResult(id){
  delete results[id];
  saveData();
}

function resetAll(){
  if(confirm("¿Borrar todos los resultados?")){
    results = {};
    saveData();
  }
}

function renderNav(){
  const nav = document.getElementById("nav");
  nav.innerHTML = Object.keys(groups).map(g => `<a href="#grupo-${g}">Grupo ${g}</a>`).join("") + `<a href="#calendario">Calendario</a><a href="#clasificacion">Clasificación</a>`;
}

function renderGroups(){
  const box = document.getElementById("groups");
  box.innerHTML = Object.entries(groups).map(([g,teams]) => `
    <div class="group" id="grupo-${g}">
      <h3>Grupo ${g}</h3>
      ${teams.map(t => `<div class="team-row"><span class="team-name">${t}</span><span class="muted">${g}</span></div>`).join("")}
    </div>
  `).join("");
}

function renderMatches(){
  const box = document.getElementById("matches");
  box.innerHTML = matches.map(m => {
    const r = results[m.id];
    return `
      <div class="match">
        <div class="match-top">
          <span class="badge">Grupo ${m.group}</span>
          <span class="muted">${m.date} · ${m.time}</span>
        </div>
        <div class="teams">
          <div class="team-box">
            <strong>${m.home}</strong>
            <span class="small">Grupo ${teamGroup(m.home)}</span>
          </div>
          <div class="vs">
            ${r ? `${r.home} - ${r.away}` : "VS"}
          </div>
          <div class="team-box">
            <strong>${m.away}</strong>
            <span class="small">Grupo ${teamGroup(m.away)}</span>
          </div>
        </div>
        <details>
          <summary>Editar resultado</summary>
          <div class="input-row">
            <label>${m.home}: <input id="h-${m.id}" type="number" min="0" value="${r ? r.home : ""}"></label>
            <label>${m.away}: <input id="a-${m.id}" type="number" min="0" value="${r ? r.away : ""}"></label>
            <button class="ok" onclick="setResult(${m.id})">✓ Confirmar</button>
            <button class="del" onclick="clearResult(${m.id})">✕ Borrar</button>
          </div>
        </details>
      </div>
    `;
  }).join("");
}

function calcStandings(){
  const table = {};
  for(const [g,teams] of Object.entries(groups)){
    table[g] = {};
    teams.forEach(t => table[g][t] = {p:0,w:0,d:0,l:0,gf:0,ga:0,gd:0,pts:0});
  }
  matches.forEach(m => {
    const r = results[m.id];
    if(!r) return;
    if(!table[m.group] || !table[m.group][m.home] || !table[m.group][m.away]) return;
    const H = table[m.group][m.home];
    const A = table[m.group][m.away];
    H.p++; A.p++;
    H.gf += r.home; H.ga += r.away;
    A.gf += r.away; A.ga += r.home;
    if(r.home > r.away){ H.w++; A.l++; H.pts += 3; }
    else if(r.home < r.away){ A.w++; H.l++; A.pts += 3; }
    else { H.d++; A.d++; H.pts += 1; A.pts += 1; }
  });
  for(const g of Object.keys(table)){
    const arr = Object.entries(table[g]).map(([team,s]) => ({team,...s,gd:s.gf-s.ga}))
      .sort((a,b) => b.pts-a.pts || b.gd-a.gd || b.gf-a.gf || a.team.localeCompare(b.team));
    table[g] = arr;
  }
  return table;
}

function renderStandings(){
  const st = calcStandings();
  const box = document.getElementById("standings");
  box.innerHTML = Object.entries(st).map(([g,arr]) => `
    <div class="group" style="margin-bottom:14px">
      <h3>Grupo ${g}</h3>
      <div class="team-row" style="font-weight:700;border-bottom:1px solid var(--line)">
        <span>Equipo</span><span>Pts</span>
      </div>
      ${arr.map(t => `
        <div class="team-row">
          <span class="team-name">${t.team}</span>
          <span class="pts">${t.pts}</span>
        </div>
      `).join("")}
    </div>
  `).join("");
}

function renderAll(){
  renderNav();
  renderGroups();
  renderMatches();
  renderStandings();
}

renderAll();
</script>
</body>
</html>
