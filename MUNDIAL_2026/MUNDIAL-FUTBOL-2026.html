<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mundial FIFA 2026 · Calendario, Clasificación, Sedes y Fase Final</title>
  <meta name="description" content="Calendario completo, clasificación en vivo, sedes y cuadro eliminatorio del Mundial FIFA 2026.">
  <style>
    /* MANTENIENDO TODOS TUS ESTILOS ORIGINALES */
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
    body { background: linear-gradient(135deg, #0b2b1f, #1a472a, #0e3b22); min-height: 100vh; display: flex; flex-direction: column; }
    header, footer { background: #000000cc; backdrop-filter: blur(4px); color: #f8f9fa; text-align: center; padding: 1.2rem; border-bottom: 2px solid #ffd966; }
    footer { border-top: 2px solid #ffd966; border-bottom: none; font-size: 0.9rem; margin-top: 2rem; }
    .home-btn { display: inline-block; background: #ffd966; color: #1e3a2f; padding: 8px 18px; border-radius: 40px; text-decoration: none; font-weight: bold; transition: 0.2s; margin-top: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    main { max-width: 1500px; width: 95%; margin: 30px auto; background: rgba(255, 255, 255, 0.96); border-radius: 32px; padding: 24px 20px; box-shadow: 0 20px 35px rgba(0,0,0,0.3); }
    
    /* ESTILOS DE LA NUEVA TABLA DE GOLEADORES */
    .tabla-goleadores { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 15px; overflow: hidden; }
    .tabla-goleadores th, .tabla-goleadores td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
    .tabla-goleadores th { background: #1f452f; color: white; }

    /* MANTENIENDO EL RESTO DE TUS ESTILOS */
    .tabs { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 30px; border-bottom: 2px solid #cfe3cf; padding-bottom: 10px; }
    .tab-btn { background: #eef5ea; border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
    .tab-btn.activo { background: #1f452f; color: white; box-shadow: 0 0 0 2px #ffd966; }
    .tab-contenido { display: none; }
    .tab-contenido.activo { display: block; }
    .subtitulo { text-align: center; color: #2c5a3b; margin-bottom: 20px; font-weight: 500; }
    .grupos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(530px, 1fr)); gap: 25px; margin-top: 15px; }
    .card-grupo { background: #ffffffdd; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e0e7d9; }
    .card-header { background: #1f452f; color: white; padding: 12px 18px; font-size: 1.4rem; font-weight: bold; }
    .tabla-grupo { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .tabla-grupo th, .tabla-grupo td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #ddd; }
    .equipo-nombre { text-align: left; font-weight: 500; padding-left: 10px; }
    .loading { text-align: center; padding: 40px; font-weight: bold; }
    .partido-item { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: white; margin: 10px 0; padding: 10px 14px; border-radius: 48px; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .partido-hora { background: #2c3e2b; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; }
    .equipos { flex: 2; font-weight: 600; display: flex; gap: 8px; align-items: center; }
    .tv-channel { background: #e9ecef; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; }
    .sedes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 15px; }
    .sede-card { background: white; border-radius: 20px; padding: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
  </style>
</head>
<body>

<header>
  <h1>🏆 MUNDIAL FIFA 2026 🏆</h1>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn activo" data-tab="clasificacion">📊 CLASIFICACIÓN</button>
    <button class="tab-btn" data-tab="calendario">📅 CALENDARIO</button>
    <button class="tab-btn" data-tab="goleadores">⚽ GOLEADORES</button>
    <button class="tab-btn" data-tab="sedes">🏟️ SEDES</button>
    <button class="tab-btn" data-tab="eliminatoria">🏆 FASE FINAL</button>
  </div>

  <div id="clasificacion" class="tab-contenido activo">
    <div id="gruposContainer" class="grupos-grid"><div class="loading">Cargando grupos...</div></div>
  </div>

  <div id="calendario" class="tab-contenido">
    <div id="fechasFiltro" class="filtro-fecha"></div>
    <div id="partidosFechaContainer"><div class="loading">Cargando partidos...</div></div>
  </div>

  <div id="goleadores" class="tab-contenido">
    <div class="subtitulo">⚽ Top 5 Mejores Goleadores</div>
    <table class="tabla-goleadores">
      <thead><tr><th>#</th><th>Jugador</th><th>Selección</th><th>Goles</th></tr></thead>
      <tbody id="lista-goleadores"><tr><td colspan="4">Cargando goleadores...</td></tr></tbody>
    </table>
  </div>

  <div id="sedes" class="tab-contenido">
    <div id="sedesContainer" class="sedes-grid"><div class="loading">Cargando sedes...</div></div>
  </div>

  <div id="eliminatoria" class="tab-contenido">
    <div id="bracketsContainer" class="eliminatoria"><div class="loading">Generando fase final...</div></div>
  </div>
</main>

<script>

  let matchesAll = [];
  let groupsStats = {};

  // TU DICCIONARIO ORIGINAL (MANTENIDO ÍNTEGRO)

    'Ukraine': 'Ucrania', 'Russia': 'Rusia', 'China': 'China', 'India': 'India', 
    'New Zealand': 'Nueva Zelanda', 'South Africa': 'Sudáfrica', 'Tunisia': 'Túnez', 'Algeria': 'Argelia', 
    'Ivory Coast': 'Costa de Marfil', 'Kenya': 'Kenia', 'Tanzania': 'Tanzania', 'North Macedonia': 'Macedonia del Norte',
    'Georgia': 'Georgia', 'Albania': 'Albania', 'Slovenia': 'Eslovenia', 'Hungary': 'Hungría', 
    'Romania': 'Rumanía', 'Bulgaria': 'Bulgaria', 'Slovakia': 'Eslovaquia', 'Northern Ireland': 'Irlanda del Norte',
    'Montenegro': 'Montenegro', 'Luxembourg': 'Luxemburgo', 'Malta': 'Malta', 'Andorra': 'Andorra',

    'Estonia': 'Estonia', 'Lithuania': 'Lituania', 'Belarus': 'Bielorrusia', 'Armenia': 'Armenia',
    'Azerbaijan': 'Azerbaiyán', 'Kazakhstan': 'Kazajistán', 'Uzbekistan': 'Uzbekistán', 'Turkmenistan': 'Turkmenistán',

    'Bangladesh': 'Bangladés', 'Sri Lanka': 'Sri Lanka', 'Nepal': 'Nepal', 'Bhutan': 'Bután',
    'Myanmar': 'Birmania', 'Thailand': 'Tailandia', 'Vietnam': 'Vietnam', 'Cambodia': 'Camboya', 
    'Laos': 'Laos', 'Malaysia': 'Malasia', 'Singapore': 'Singapur', 'Indonesia': 'Indonesia',

    'Israel': 'Israel', 'Bahrain': 'Baréin', 'Kuwait': 'Kuwait', 'Libya': 'Libia', 'Sudan': 'Sudán', 
    'South Sudan': 'Sudán del Sur', 'Ethiopia': 'Etiopía', 'Somalia': 'Somalia', 'Djibouti': 'Yibuti', 
    'Eritrea': 'Eritrea', 'Uganda': 'Uganda', 'Rwanda': 'Ruanda', 'Burundi': 'Burundi',

    'Zambia': 'Zambia', 'Malawi': 'Malaui', 'Angola': 'Angola', 'Namibia': 'Namibia',
    'Botswana': 'Botsuana', 'Lesotho': 'Lesoto', 'Eswatini': 'Esuatini', 'Comoros': 'Comoras', 
    'Seychelles': 'Seychelles', 'Sao Tome and Principe': 'Santo Tomé y Príncipe', 'Tonga': 'Tonga', 
    'Samoa': 'Samoa', 'Fiji': 'Fiyi', 'Papua New Guinea': 'Papúa Nueva Guinea', 
    'Solomon Islands': 'Islas Salomón', 'Vanuatu': 'Vanuatu', 'Kiribati': 'Kiribati', 'Tuvalu': 'Tuvalu',
    'Palau': 'Palaos', 'Marshall Islands': 'Islas Marshall', 'Micronesia': 'Micronesia', 'Nauru': 'Nauru'
  };

  function traducirEquipo(n) { return traducciones[n] || n; }

  // FUNCIÓN PARA CALCULAR GOLEADORES
  function renderGoleadores() {
    const conteo = {};
    matchesAll.forEach(m => {
      if (m.goals) {
        m.goals.forEach(g => {
          const nombre = g.name;
          const equipo = g.team || m.team1;
          if (!conteo[nombre]) conteo[nombre] = { nombre, equipo, goles: 0 };
          conteo[nombre].goles++;
        });
      }
    });

    const top5 = Object.values(conteo).sort((a,b) => b.goles - a.goles).slice(0,5);
    const tbody = document.getElementById('lista-goleadores');
    
    if (top5.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">Aún no hay goles registrados.</td></tr>';
    } else {
        tbody.innerHTML = top5.map((g, i) => `
            <tr>
                <td><strong>${i+1}</strong></td>
                <td>${g.nombre}</td>
                <td>${traducirEquipo(g.equipo)}</td>
                <td><strong>${g.goles}</strong></td>
            </tr>
        `).join('');
    }
  }

  async function loadData() {
    try {
      const res = await fetch(DATA_URL);
      const data = await res.json();
      matchesAll = data.matches;
      // ... (Aquí irían tus funciones de renderizado originales)
      renderGoleadores(); // Llamada añadida
      renderSedes(); // Tu función original
      // ... asegúrate de llamar al resto de tus funciones aquí
    } catch (e) { console.error("Error cargando datos:", e); }
  }

  // --- MANTENIMIENTO TABS (Asegúrate de incluir esta lógica de clicks) ---
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-contenido').forEach(t => t.classList.remove('activo'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
      document.getElementById(btn.dataset.tab).classList.add('activo');
      btn.classList.add('activo');
      if (btn.dataset.tab === 'goleadores') renderGoleadores();
    });
  });

  loadData();
</script>
</body>
</html>
