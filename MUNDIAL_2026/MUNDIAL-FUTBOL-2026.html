<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Mundial FIFA 2026 · Calendario, Clasificación, Sedes y Fase Final</title>
  <meta name="description" content="Calendario completo, clasificación en vivo, sedes y cuadro eliminatorio del Mundial FIFA 2026. Horarios en España (hora de Madrid), resultados actualizados automáticamente y fase final con los 48 equipos.">
  <meta name="keywords" content="Mundial 2026, calendario Mundial 2026, clasificación Mundial FIFA 2026, horarios Mundial España, fase final Mundial 2026, resultados Mundial fútbol, grupos Mundial 2026, cuadro eliminatorio 2026, sedes Mundial 2026, estadios Mundial 2026">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif; }
    body { background: linear-gradient(135deg, #0b2b1f, #1a472a, #0e3b22); min-height: 100vh; display: flex; flex-direction: column; }
    header, footer { background: #000000cc; backdrop-filter: blur(4px); color: #f8f9fa; text-align: center; padding: 1.2rem; border-bottom: 2px solid #ffd966; }
    footer { border-top: 2px solid #ffd966; border-bottom: none; font-size: 0.9rem; margin-top: 2rem; }
    .home-btn { display: inline-block; background: #ffd966; color: #1e3a2f; padding: 8px 18px; border-radius: 40px; text-decoration: none; font-weight: bold; transition: 0.2s; margin-top: 10px; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
    .home-btn:hover { background: #ffc107; transform: scale(1.02); }
    main { max-width: 1500px; width: 95%; margin: 30px auto; background: rgba(255, 255, 255, 0.96); border-radius: 32px; padding: 24px 20px; box-shadow: 0 20px 35px rgba(0,0,0,0.3); }
    h1 { font-size: 2rem; background: linear-gradient(135deg, #1f5e3a, #ffc857); -webkit-background-clip: text; background-clip: text; color: transparent; display: inline-block; }
    
    .intro-seo { max-width: 1100px; margin: 0 auto 30px auto; padding: 24px 28px; background: linear-gradient(135deg, #f4f9f1, #eef5ea); border-left: 5px solid #1f452f; border-radius: 12px; color: #2c3e2b; line-height: 1.7; font-size: 0.98rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .intro-seo h2 { color: #1f452f; font-size: 1.4rem; margin-bottom: 12px; font-weight: 700; }
    .intro-seo h3 { color: #2a6e46; font-size: 1.1rem; margin: 14px 0 6px 0; font-weight: 600; }
    .intro-seo p { margin-bottom: 10px; }
    .intro-seo ul { margin: 8px 0 12px 22px; }
    .intro-seo li { margin-bottom: 4px; }
    .intro-seo strong { color: #1f452f; }
    
    .tabs { display: flex; flex-wrap: wrap; gap: 12px; margin-bottom: 30px; border-bottom: 2px solid #cfe3cf; padding-bottom: 10px; }
    .tab-btn { background: #eef5ea; border: none; padding: 10px 24px; border-radius: 40px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
    .tab-btn.activo { background: #1f452f; color: white; box-shadow: 0 0 0 2px #ffd966; }
    .tab-contenido { display: none; }
    .tab-contenido.activo { display: block; }
    .subtitulo { text-align: center; color: #2c5a3b; margin-bottom: 20px; font-weight: 500; }
    .grupos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(530px, 1fr)); gap: 25px; margin-top: 15px; }
    .card-grupo { background: #ffffffdd; border-radius: 28px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); overflow: hidden; border: 1px solid #e0e7d9; }
    .card-header { background: #1f452f; color: white; padding: 12px 18px; font-size: 1.4rem; font-weight: bold; }
    .tabla-grupo { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .tabla-grupo th, .tabla-grupo td { padding: 8px 4px; text-align: center; border-bottom: 1px solid #ddd; }
    .equipo-nombre { text-align: left; font-weight: 500; padding-left: 10px; }
    
    /* Goleadores */
    .tabla-goleadores { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
    .tabla-goleadores th, .tabla-goleadores td { padding: 12px; border-bottom: 1px solid #ddd; text-align: center; }
    .tabla-goleadores th { background: #1f452f; color: white; }

    .filtro-fecha { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; background: #eef5ea; padding: 12px; border-radius: 48px; }
    .filtro-fecha button { background: #2a6e46; border: none; padding: 6px 16px; border-radius: 30px; color: white; cursor: pointer; }
    .filtro-fecha button.activo-fecha { background: #ffb347; color: #1e3a2f; }
    .partido-item { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; background: white; margin: 10px 0; padding: 10px 14px; border-radius: 48px; gap: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
    .partido-hora { background: #2c3e2b; color: white; padding: 4px 12px; border-radius: 30px; font-size: 0.75rem; white-space: nowrap; }
    .equipos { flex: 2; font-weight: 600; display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .tv-channel { background: #e9ecef; border-radius: 30px; padding: 4px 12px; font-size: 0.7rem; font-weight: bold; }
    .loading, .error { text-align: center; padding: 40px; font-weight: bold; }
    .error { color: #c00; }
    
    .sedes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; margin-top: 15px; }
    .sede-card { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border: 1px solid #e0e7d9; }
    .sede-header { padding: 16px 18px; color: white; font-weight: bold; font-size: 1.1rem; }
    .sede-header.usa { background: linear-gradient(135deg, #1f452f, #2a6e46); }
    .sede-header.mexico { background: linear-gradient(135deg, #006847, #009966); }
    .sede-header.canada { background: linear-gradient(135deg, #c41e3a, #e63946); }
    .sede-body { padding: 16px 18px; }
    .sede-partido-item { background: #f4f9f1; padding: 8px 12px; border-radius: 12px; margin-bottom: 6px; font-size: 0.8rem; display: flex; justify-content: space-between; align-items: center; }
    .filtro-pais { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; background: #eef5ea; padding: 12px; border-radius: 48px; }
    .filtro-pais button { background: #2a6e46; border: none; padding: 6px 16px; border-radius: 30px; color: white; cursor: pointer; }
    .filtro-pais button.activo-pais { background: #ffb347; color: #1e3a2f; font-weight: bold; }
  </style>
</head>
<body>
<header>
  <h1>🏆 MUNDIAL FIFA 2026 🏆</h1>
</header>

<main>
  <div class="tabs">
    <button class="tab-btn activo" data-tab="clasificacion">📊 CLASIFICACIÓN</button>
    <button class="tab-btn" data-tab="calendario">📅 CALENDARIO</button>
    <button class="tab-btn" data-tab="goleadores">⚽ GOLEADORES</button>
    <button class="tab-btn" data-tab="sedes">🏟️ SEDES</button>
    <button class="tab-btn" data-tab="eliminatoria">🏆 FASE FINAL</button>
  </div>

  <div id="clasificacion" class="tab-contenido activo">
    <div id="gruposContainer" class="grupos-grid"><div class="loading">Cargando grupos...</div></div>
  </div>

  <div id="calendario" class="tab-contenido">
    <div id="fechasFiltro" class="filtro-fecha"></div>
    <div id="partidosFechaContainer"><div class="loading">Cargando partidos...</div></div>
  </div>

  <div id="goleadores" class="tab-contenido">
    <div class="subtitulo">⚽ Top 5 Goleadores</div>
    <table class="tabla-goleadores">
      <thead><tr><th>#</th><th>Jugador</th><th>Selección</th><th>Goles</th></tr></thead>
      <tbody id="lista-goleadores"><tr><td colspan="4">Cargando goleadores...</td></tr></tbody>
    </table>
  </div>

  <div id="sedes" class="tab-contenido">
    <div id="filtroPais" class="filtro-pais">
      <button class="activo-pais" data-pais="todos">🌎 Todas</button>
      <button data-pais="USA">🇺🇸 USA</button>
      <button data-pais="MEX">🇲🇽 MEX</button>
      <button data-pais="CAN">🇨🇦 CAN</button>
    </div>
    <div id="sedesContainer" class="sedes-grid"><div class="loading">Cargando sedes...</div></div>
  </div>

  <div id="eliminatoria" class="tab-contenido">
    <div id="bracketsContainer"></div>
  </div>
</main>

<script>
  const DATA_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';
  let matchesAll = [];
  let groupsStats = {};
  const traducciones = { 'Argentina': 'Argentina', 'Brazil': 'Brasil', 'Germany': 'Alemania', 'Spain': 'España', 'France': 'Francia', 'Mexico': 'México', 'United States': 'Estados Unidos', 'Canada': 'Canadá' /*... resto de tus traducciones ...*/ };

  function traducirEquipo(n) { return traducciones[n] || n; }

  async function loadData() {
    try {
      const res = await fetch(DATA_URL);
      const data = await res.json();
      matchesAll = data.matches;
      buildGroupsStructure();
      updateStats();
      renderClasificacion();
      renderCalendario();
      renderGoleadores(); 
      renderSedes();
      renderFaseFinal();
    } catch (e) { console.error(e); }
  }

  // --- Lógica Goleadores ---
  function renderGoleadores() {
    const conteo = {};
    matchesAll.forEach(m => {
      if (m.goals) {
        m.goals.forEach(g => {
          if (!conteo[g.name]) conteo[g.name] = { nombre: g.name, equipo: g.team || m.team1, goles: 0 };
          conteo[g.name].goles++;
        });
      }
    });
    const top5 = Object.values(conteo).sort((a,b) => b.goles - a.goles).slice(0,5);
    const tbody = document.getElementById('lista-goleadores');
    if (top5.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4">Aún no hay goles registrados.</td></tr>';
    } else {
        tbody.innerHTML = top5.map((g, i) => `
            <tr><td><strong>${i+1}</strong></td><td>${g.nombre}</td><td>${traducirEquipo(g.equipo)}</td><td><strong>${g.goles}</strong></td></tr>
        `).join('');
    }
  }

  function buildGroupsStructure() { /* ... tu lógica original de grupos ... */ }
  function updateStats() { /* ... tu lógica original de estadísticas ... */ }
  function renderClasificacion() { /* ... tu lógica original ... */ }
  function renderCalendario() { /* ... tu lógica original ... */ }
  function renderSedes(filtroPais = 'todos') { /* ... tu lógica original ... */ }
  function renderFaseFinal() { /* ... tu lógica original ... */ }

  // Mantenimiento TABS
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-contenido').forEach(t => t.classList.remove('activo'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('activo'));
      document.getElementById(btn.dataset.tab).classList.add('activo');
      btn.classList.add('activo');
    });
  });

  loadData();
</script>
</body>
</html>
