name: Actualizar Noticias

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4
      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: pip install requests feedparser deep-translator
      - name: Generar noticias.json
        run: python .github/workflows/generar_noticias.py
      - name: Guardar en repositorio
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add NOTICIAS/noticias.json
          git diff --cached --quiet || git commit -m "Noticias actualizadas $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
