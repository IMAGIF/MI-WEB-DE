<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MI WEB DE</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .page-header, .page-footer {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    .home-button {
      display: inline-block;
      margin: 10px auto;
      padding: 10px 20px;
      background: red;
      color: white;
      border-radius: 5px;
      text-decoration: none;
      cursor: pointer;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    /* NUEVA CUADRÍCULA MEJORADA */
    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    .card {
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s ease;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
      background: #000;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card a {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* 🔥 NUEVO SISTEMA DE IMÁGENES SIN MÁRGENES NI RECORTES */
    .card img {
      width: 100%;
      height: 100%;
      object-fit: cover;      /* Rellena la tarjeta */
      aspect-ratio: 4 / 3;    /* Proporción equilibrada */
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
    }
  </style>
</head>
