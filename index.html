<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MI WEB DE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .page-header, .page-footer {
      background: black;
      color: white;
      padding: 20px;
      text-align: center;
      width: 100%;
    }

    .home-button {
      display: inline-block;
      margin: 10px auto;
      padding: 10px 20px;
      background: red;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      padding: 20px;
    }

    .card {
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s ease;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 220px;
      position: relative;
      background-color: #000;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card a {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      color: inherit;
      position: relative;
      z-index: 1;
    }

    .card img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* evita cortes */
      background-color: #000; /* fondo neutro */
      border-radius: 10px;
    }

    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      }
      .home-button {
        margin: 10px auto;
      }
    }
  </style>
</head>
