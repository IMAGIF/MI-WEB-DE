<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>METEO</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* ENCABEZADO UNIFICADO */
    .page-header {
      background: black;
      color: white;
      padding: 25px 20px;
      text-align: center;
      width: 100%;
    }

    .page-header h1 {
      font-size: 2rem;
      margin-bottom: 5px;
      letter-spacing: 2px;
    }

    #clock {
      font-size: 1.1rem;
      color: #fdbb2d;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .home-button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: white;
      color: black;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .home-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,255,255,0.4);
    }

    /* CONTENIDO */
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: repeat(2, 1fr);
      }
      #clock {
        font-size: 1rem;
      }
    }

    .card {
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      height: 150px;
      background: linear-gradient(145deg, #0a1a33, #0f2b55);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.35);
    }

    .card a {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      height: 100%;
      width: 100%;
      color: white;
      text-align: center;
    }

    .icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .card h2 {
      font-size: 1.2rem;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }

    /* PIE DE PÁGINA */
    .page-footer {
      margin-top: auto;
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 1rem;
    }

    .page-footer p {
      margin: 5px 0;
    }
  </style>
</head>

<body>

  <!-- ENCABEZADO UNIFICADO CON RELOJ -->
  <header class="page-header">
    <h1>METEO</h1>
    <div id="clock"></div>
    <a href="https://imagif.github.io/MI-WEB-DE/" class="home-button">Inicio</a>
  </header>

  <div class="container">
    <div class="grid-container">

      <!-- BOTÓN 1: SOL Y LUNA -->
      <div class="card">
        <a href="https://imagif.github.io/MI-WEB-DE/METEO/SOL Y LUNA.html">
          <span class="icon">☀️🌙</span>
          <h2>SOL Y LUNA</h2>
        </a>
      </div>

      <!-- BOTÓN 2: MAREAS -->
      <div class="card">
        <a href="https://imagif.github.io/MI-WEB-DE/METEO/MAREAS.html">
          <span class="icon">🌊</span>
          <h2>MAREAS</h2>
        </a>
      </div>

      <!-- BOTÓN 3: PUERTOS DEL ESTADO -->
      <div class="card">
        <a href="https://imagif.github.io/MI-WEB-DE/METEO/PUERTOS ESTADO.html">
          <span class="icon">⚓</span>
          <h2>PUERTOS DEL ESTADO</h2>
        </a>
      </div>

      <!-- BOTONES 4–10: DE MOMENTO A INICIO -->
      <div class="card"><a href="https://imagif.github.io/MI-WEB-DE/"><span class="icon">⭐</span><h2>BOTÓN 4</h2></a></div>
      <div class="card"><a href="https://imagif.github.io/MI-WEB-DE/"><span class="icon">⭐</span><h2>BOTÓN 5</h2></a></div>
      <div class="card"><a href="https://imagif.github.io/MI-WEB-DE/"><span class="icon">⭐</span><h2>BOTÓN 6</h2></a></div>
      <div class="card"><a href="https://imagif.github.io/MI-WEB-DE/"><span class="icon">⭐</span><h2>BOTÓN 7</h2></a></div>
      <div class="card"><a href="https://imagif.github.io/MI-WEB-DE/"><span class="icon">⭐</span><h2>BOTÓN 8</h2></a></div>
      <div class="card"><a href="https://imagif.github.io/MI-WEB-DE/"><span class="icon">⭐</span><h2>BOTÓN 9</h2></a></div>
      <div class="card"><a href="https://imagif.github.io/MI-WEB-DE/"><span class="icon">⭐</span><h2>BOTÓN 10</h2></a></div>

    </div>
  </div>

  <footer class="page-footer">
    <p>2025 Creado por #imagif</p>
    <p>email: imagenesgifs@gmail.com</p>
  </footer>

  <!-- SCRIPT DEL RELOJ -->
  <script>
    function updateClock() {
      const now = new Date();
      const options = { hour: '2-digit', minute: '2-digit', second: '2-digit' };
      document.getElementById('clock').textContent = now.toLocaleTimeString('es-ES', options);
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
