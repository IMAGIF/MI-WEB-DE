<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>METEO</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #1a2a6c, #b21f1f, #fdbb2d);
      background-size: 400% 400%;
      animation: gradient 15s ease infinite;
      display: flex;
      flex-direction: column;
    }

    @keyframes gradient {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .page-header {
      background: black;
      color: white;
      padding: 25px 20px;
      text-align: center;
      width: 100%;
    }

    .page-header h1 {
      font-size: 2rem;
      margin-bottom: 10px;
      letter-spacing: 2px;
    }

    .city-selector {
      margin-bottom: 15px;
    }

    .city-selector input {
      padding: 8px 12px;
      border-radius: 5px;
      border: none;
      width: 200px;
      font-size: 1rem;
    }

    .city-selector button {
      padding: 8px 15px;
      margin-left: 8px;
      border-radius: 5px;
      border: none;
      background: #fdbb2d;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .city-selector button:hover {
      background: white;
      color: black;
    }

    .meteo-bar {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 25px;
      margin-bottom: 10px;
      flex-wrap: wrap;
    }

    #clock {
      font-size: 1.6rem;
      font-weight: bold;
      color: #fdbb2d;
    }

    #weather-icon { font-size: 2.6rem; }

    #pressure, #temp, #humidity, #wind {
      font-size: 1.2rem;
      color: #fdbb2d;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .meteo-bar {
        flex-direction: column;
        gap: 5px;
      }
      #clock { font-size: 1.3rem; }
      #weather-icon { font-size: 2.3rem; }
      #pressure, #temp, #humidity, #wind { font-size: 1.1rem; }
    }

    .home-button {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 20px;
      background: white;
      color: black;
      border-radius: 5px;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .home-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255,255,255,0.4);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px;
    }

    .grid-container {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }

    @media (max-width: 768px) {
      .grid-container {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .card {
      border-radius: 15px;
      overflow: hidden;
      transition: transform 0.3s ease;
      box-shadow: 0 10px 20px rgba(0,0,0,0.25);
      height: 150px;
      background: linear-gradient(145deg, #0a1a33, #0f2b55);
      border: 1px solid rgba(255,255,255,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card:hover {
      transform: translateY(-10px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.35);
    }

    .card a {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      height: 100%;
      width: 100%;
      color: white;
      text-align: center;
    }

    .icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .card h2 {
      font-size: 1.1rem;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.4);
    }

    /* Destacado para vitamina D */
    .card.featured {
      background: linear-gradient(145deg, #1a3a1a, #1e5c1e);
      border: 1px solid rgba(255,220,50,0.3);
    }

    .page-footer {
      margin-top: auto;
      background: black;
      color: white;
      text-align: center;
      padding: 20px;
      font-size: 1rem;
    }
  </style>
</head>

<body>

  <header class="page-header">
    <h1>METEO</h1>

    <div class="city-selector">
      <input type="text" id="city-input" placeholder="Introduce una ciudad">
      <button onclick="searchCity()">Buscar</button>
    </div>

    <div class="meteo-bar">
      <div id="clock">--:--:--</div>
      <div id="weather-icon">⏳</div>
      <div id="temp">--°C</div>
      <div id="humidity">--%</div>
      <div id="wind">-- km/h</div>
      <div id="pressure">---- hPa</div>
    </div>

    <a href="https://imagif.github.io/MI-WEB-DE/" class="home-button">Inicio</a>
  </header>

  <div class="container">
    <div class="grid-container">

      <!-- 1. PREDICCIÓN DEL TIEMPO -->
      <div class="card">
        <a href="https://www.accuweather.com/es/es/spain-weather" target="_blank">
          <span class="icon">📅🌦️</span>
          <h2>PREDICCIÓN</h2>
        </a>
      </div>

      <!-- 2. SOL Y LUNA -->
      <div class="card">
        <a href="https://imagif.github.io/MI-WEB-DE/METEO/SOL Y LUNA.html">
          <span class="icon">☀️🌙</span>
          <h2>SOL Y LUNA</h2>
        </a>
      </div>

      <!-- 3. ÍNDICE VITAMINA D -->
      <div class="card featured">
        <a href="https://imagif.github.io/MI-WEB-DE/METEO/INDICE_VITAMINA_D.html">
          <span class="icon">🌞💊</span>
          <h2>VITAMINA D</h2>
        </a>
      </div>

      <!-- 4. ÍNDICE UV -->
      <div class="card">
        <a href="https://www.aemet.es/es/eltiempo/prediccion/radiacionuv">
          <span class="icon">🔆</span>
          <h2>ÍNDICE UV</h2>
        </a>
      </div>

      <!-- 5. NUBES -->
      <div class="card">
        <a href="https://www.windy.com/?clouds,43.36,-8.41,8">
          <span class="icon">☁️</span>
          <h2>NUBES</h2>
        </a>
      </div>

      <!-- 6. RADAR LLUVIA -->
      <div class="card">
        <a href="https://www.meteogalicia.gal/web/predicion/portada">
          <span class="icon">🌧️</span>
          <h2>RADAR LLUVIA</h2>
        </a>
      </div>

      <!-- 7. MAREAS -->
      <div class="card">
        <a href="https://imagif.github.io/MI-WEB-DE/METEO/MAREAS.html">
          <span class="icon">🌊</span>
          <h2>MAREAS</h2>
        </a>
      </div>

      <!-- 8. MAREA CORUÑA -->
      <div class="card">
        <a href="https://tablademareas.com/es/a-coruna/a-coruna#_tabla_mareas">
          <span class="icon">🌊⚓</span>
          <h2>MAREA CORUÑA</h2>
        </a>
      </div>

      <!-- 9. PUERTOS DEL ESTADO -->
      <div class="card">
        <a href="https://imagif.github.io/MI-WEB-DE/METEO/PUERTOS ESTADO.html">
          <span class="icon">⚓</span>
          <h2>PUERTOS DEL ESTADO</h2>
        </a>
      </div>

      <!-- 10. FASE LUNAR -->
      <div class="card">
        <a href="https://www.timeanddate.com/moon/phases/">
          <span class="icon">🌕</span>
          <h2>FASE LUNAR</h2>
        </a>
      </div>

      <!-- 11. LUNA LLENA -->
      <div class="card">
        <a href="https://www.timeanddate.com/moon/phases/spain/a-coruna">
          <span class="icon">🌝</span>
          <h2>LUNA LLENA</h2>
        </a>
      </div>

      <!-- 12. ECLIPSES -->
      <div class="card">
        <a href="https://www.timeanddate.com/eclipse/">
          <span class="icon">🌑</span>
          <h2>ECLIPSES</h2>
        </a>
      </div>

    </div>
  </div>

  <footer class="page-footer">
    <p>2026 Creado por #imagif</p>
    <p>email: imagenesgifs@gmail.com</p>
  </footer>

  <script>
    function updateClock() {
      const now = new Date();
      document.getElementById('clock').textContent =
        now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    }
    setInterval(updateClock, 1000);
    updateClock();

    async function loadWeather(lat, lon) {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&hourly=relativehumidity_2m,pressure_msl,windspeed_10m`;

      try {
        const resp = await fetch(url);
        const data = await resp.json();

        const code = data.current_weather.weathercode;
        const temp = data.current_weather.temperature;
        const wind = data.current_weather.windspeed;
        const humidity = data.hourly.relativehumidity_2m[0];
        const pressure = data.hourly.pressure_msl[0];

        const icons = {
          0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
          45: "🌫️", 48: "🌫️",
          51: "🌦️", 53: "🌦️", 55: "🌧️",
          61: "🌧️", 63: "🌧️", 65: "🌧️",
          71: "🌨️",
          80: "🌦️", 81: "🌧️", 82: "⛈️",
          95: "⛈️", 96: "⛈️", 99: "⛈️"
        };

        document.getElementById("weather-icon").textContent = icons[code] || "❓";
        document.getElementById("temp").textContent = `${temp}°C`;
        document.getElementById("humidity").textContent = `${humidity}%`;
        document.getElementById("wind").textContent = `${wind} km/h`;
        document.getElementById("pressure").textContent = `${pressure} hPa`;

      } catch (e) {
        document.getElementById("weather-icon").textContent = "⚠️";
      }
    }

    async function searchCity() {
      const city = document.getElementById("city-input").value.trim();

      if (city === "") {
        loadWeather(43.3623, -8.4115);
        return;
      }

      const geoUrl = `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1&language=es&format=json`;

      try {
        const resp = await fetch(geoUrl);
        const data = await resp.json();

        if (!data.results || data.results.length === 0) {
          alert("Ciudad no encontrada. Se mantiene A Coruña.");
          loadWeather(43.3623, -8.4115);
          return;
        }

        loadWeather(data.results[0].latitude, data.results[0].longitude);

      } catch (e) {
        alert("Error buscando la ciudad.");
        loadWeather(43.3623, -8.4115);
      }
    }

    loadWeather(43.3623, -8.4115);
  </script>

</body>
</html>
