<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creador de Imágenes (Prompt avanzado)</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #ffeef7;
        margin: 0;
        padding-bottom: 60px;
    }

    header {
        background-color: #1e2851;
        color: #fff;
        text-align: center;
        padding: 15px 0;
        max-width: 850px;
        margin: 0 auto;
        border-radius: 10px;
        position: relative;
    }

    header a {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: #ffcc00;
        padding: 8px 14px;
        border-radius: 6px;
        color: #000;
        font-weight: bold;
        text-decoration: none;
        border: 2px solid #000;
    }

    .contenedor {
        max-width: 850px;
        margin: 20px auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
    }

    textarea, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        background-color: #1e2851;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
        margin-bottom: 10px;
    }

    #resultado {
        margin-top: 20px;
        padding: 10px;
        background: #f3f3f3;
        border-radius: 8px;
        font-size: 14px;
        white-space: pre-wrap;
    }

    .historial div {
        background: #f7f7f7;
        padding: 8px;
        border-radius: 6px;
        margin-bottom: 8px;
        font-size: 13px;
        white-space: pre-wrap;
    }

    footer {
        background-color: #1e2851;
        color: #fff;
        text-align: center;
        padding: 10px 0;
        max-width: 850px;
        margin: 0 auto;
        border-radius: 10px;
    }
</style>
</head>

<body>

<header>
    <a href="https://imagif.github.io/MI-WEB-DE/">INICIO</a>
    <h1>Creador de Imágenes (Prompt avanzado)</h1>
</header>

<div class="contenedor">

    <h2>Descripción</h2>
    <textarea id="descripcion" placeholder="Ejemplo: Superhéroe estilo cómic saltando entre edificios, de noche, con lluvia."></textarea>

    <h2>Tipo de imagen</h2>
    <select id="tipo" onchange="actualizarEstilos()">
        <option value="Cómic">Cómic</option>
        <option value="Foto realista">Foto realista</option>
        <option value="Pintura">Pintura</option>
        <option value="Fotografía">Fotografía</option>
        <option value="Paisaje">Paisaje</option>
        <option value="Ilustración">Ilustración</option>
        <option value="Pixel art">Pixel art</option>
        <option value="3D render">3D render</option>
        <option value="Acuarela">Acuarela</option>
    </select>

    <h2>Estilo</h2>
    <select id="estilo">
        <!-- Se rellena dinámicamente -->
    </select>

    <h2>Formato</h2>
    <select id="formato">
        <option value="9:16">9:16 (vertical)</option>
        <option value="16:9">16:9 (horizontal)</option>
        <option value="1:1">1:1 (cuadrado)</option>
    </select>

    <button onclick="crearPrompt()">Crear prompt</button>

    <div id="resultado"></div>

    <button id="copiar" style="display:none;" onclick="copiarPrompt()">Copiar prompt</button>
    <button id="abrir" style="display:none;" onclick="abrirPerchance()">Abrir en Perchance</button>

    <h2>Historial de prompts</h2>
    <div id="historial"></div>

</div>

<footer>
    © 2025 Creador de Imágenes – #imagif
</footer>

<script>
let ultimoPrompt = "";

// Mapa de estilos según tipo
const estilosPorTipo = {
    "Cómic": [
        "Disney",
        "Manga",
        "Anime",
        "Tradicional",
        "Infantil",
        "Superhéroes",
        "Cartoon americano"
    ],
    "Foto realista": [
        "Alta resolución",
        "HDR",
        "Cinemática",
        "Vintage",
        "Blanco y negro",
        "Retrato profesional"
    ],
    "Pintura": [
        "Renacentista",
        "Impresionista",
        "Barroco",
        "Clásico",
        "Óleo",
        "Acuarela artística"
    ],
    "Fotografía": [
        "Retrato profesional",
        "Macro",
        "Blanco y negro",
        "Vintage",
        "Cinemática",
        "Documental"
    ],
    "Paisaje": [
        "Fantasía",
        "Realista",
        "Concept art",
        "Matte painting",
        "Minimalista",
        "Épico"
    ],
    "Ilustración": [
        "Digital art",
        "Libro infantil",
        "Minimalista",
        "Concept art",
        "Estilo cómic suave",
        "Estilo cartoon"
    ],
    "Pixel art": [
        "Retro 8-bit",
        "Retro 16-bit",
        "Estilo videojuego",
        "Minimalista",
        "Chibi pixel",
        "Isométrico"
    ],
    "3D render": [
        "Realista",
        "Estilo Pixar",
        "Estilo videojuego",
        "Low poly",
        "Alta definición",
        "Cinemático"
    ],
    "Acuarela": [
        "Suave",
        "Infantil",
        "Paisaje acuarela",
        "Retrato acuarela",
        "Minimalista",
        "Fantasia acuarela"
    ]
};

function actualizarEstilos() {
    const tipo = document.getElementById("tipo").value;
    const estiloSelect = document.getElementById("estilo");
    estiloSelect.innerHTML = "";

    const estilos = estilosPorTipo[tipo] || [];

    estilos.forEach(est => {
        const opt = document.createElement("option");
        opt.value = est;
        opt.textContent = est;
        estiloSelect.appendChild(opt);
    });
}

// Inicializar estilos al cargar
actualizarEstilos();

function crearPrompt() {
    const descripcion = document.getElementById("descripcion").value.trim();
    const tipo = document.getElementById("tipo").value;
    const estilo = document.getElementById("estilo").value;
    const formato = document.getElementById("formato").value;

    if (!descripcion) {
        document.getElementById("resultado").innerHTML = "Por favor, escribe una descripción.";
        return;
    }

    const prompt =
`Descripción principal: ${descripcion}

Tipo de imagen: ${tipo}
Estilo específico: ${estilo}
Formato: ${formato}

Instrucciones adicionales:
- Composición cuidada y equilibrada.
- Iluminación coherente con la escena.
- Colores bien definidos y armoniosos.
- Nivel de detalle alto en el sujeto principal.
- Fondo acorde al tipo de imagen y estilo.
- Calidad profesional, apta para impresión o uso digital.

Este prompt está pensado para generadores de imágenes (IA) como Perchance, Stable Diffusion, Flux, etc.`;

    ultimoPrompt = prompt;

    document.getElementById("resultado").innerText = prompt;
    document.getElementById("copiar").style.display = "block";
    document.getElementById("abrir").style.display = "block";

    const div = document.createElement("div");
    div.innerText = prompt;
    document.getElementById("historial").prepend(div);
}

function copiarPrompt() {
    navigator.clipboard.writeText(ultimoPrompt);
    alert("Prompt copiado");
}

function abrirPerchance() {
    const url = "https://perchance.org/ai-character-generator?prompt=" + encodeURIComponent(ultimoPrompt);
    window.open(url, "_blank");
}
</script>

</body>
</html>
