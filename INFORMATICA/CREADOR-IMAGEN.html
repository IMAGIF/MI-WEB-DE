<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creador de Prompts de Imagen</title>

<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
        font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        background: linear-gradient(135deg, #1a2332, #2a3442);
        margin: 0;
        padding-bottom: 60px;
        color: #f8f9fa;
        min-height: 100vh;
    }

    header {
        background: #000000cc;
        backdrop-filter: blur(4px);
        color: #fff;
        text-align: center;
        padding: 15px 0;
        max-width: 850px;
        margin: 20px auto;
        border-radius: 10px;
        border: 2px solid #ffd966;
        position: relative;
    }

    header a {
        position: absolute;
        left: 15px;
        top: 50%;
        transform: translateY(-50%);
        background: #ffd966;
        padding: 8px 14px;
        border-radius: 6px;
        color: #1e3a2f;
        font-weight: bold;
        text-decoration: none;
        border: 2px solid #000;
    }

    header h1 {
        margin: 0;
        font-size: 1.6rem;
    }

    .contenedor {
        max-width: 850px;
        margin: 20px auto;
        background: rgba(255, 255, 255, 0.96);
        padding: 25px;
        border-radius: 12px;
        color: #2c3e2b;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    .contenedor h2 {
        color: #1f452f;
        margin-bottom: 8px;
        font-size: 1.1rem;
    }

    textarea, select {
        width: 100%;
        padding: 12px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
        font-family: inherit;
    }

    textarea {
        min-height: 100px;
        resize: vertical;
    }

    button {
        background: linear-gradient(135deg, #1f452f, #2a6e46);
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
        margin-bottom: 10px;
        font-weight: bold;
        transition: 0.2s;
    }

    button:hover {
        background: linear-gradient(135deg, #2a6e46, #1f452f);
        transform: translateY(-1px);
    }

    #resultado {
        margin-top: 20px;
        padding: 15px;
        background: #f4f9f1;
        border-radius: 8px;
        font-size: 14px;
        white-space: pre-wrap;
        border-left: 4px solid #ffd966;
        line-height: 1.6;
    }

    .historial div {
        background: #eef5ea;
        padding: 10px;
        border-radius: 6px;
        margin-bottom: 8px;
        font-size: 13px;
        white-space: pre-wrap;
        border-left: 3px solid #2a6e46;
    }

    footer {
        background: #000000cc;
        backdrop-filter: blur(4px);
        color: #fff;
        text-align: center;
        padding: 20px;
        max-width: 850px;
        margin: 20px auto;
        border-radius: 10px;
        border-top: 2px solid #ffd966;
    }

    .social-section {
        margin-top: 20px;
    }

    .social-section p {
        margin-bottom: 15px;
        font-weight: bold;
        color: #ffd966;
    }

    .social-buttons {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        justify-content: center;
    }

    .social-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 14px;
        background: #ffd966;
        color: #1e3a2f;
        text-decoration: none;
        border-radius: 30px;
        font-weight: bold;
        font-size: 0.9rem;
        transition: 0.2s;
        border: 2px solid #1e3a2f;
    }

    .social-btn:hover {
        background: #ffc107;
        transform: scale(1.05);
    }

    .social-btn img {
        width: 18px;
        height: 18px;
    }

    @media (max-width: 700px) {
        .contenedor {
            padding: 18px;
        }
        header {
            padding: 12px 0;
        }
        header h1 {
            font-size: 1.3rem;
        }
        .social-buttons {
            flex-direction: column;
            align-items: center;
        }
    }
</style>
</head>

<body>

<header>
    <a href="https://imagif.github.io/MI-WEB-DE/">INICIO</a>
    <h1>Creador de prompts de imagen</h1>
</header>

<div class="contenedor">

    <h2>Descripción</h2>
    <textarea id="descripcion" placeholder="Ejemplo: Superhero comic style jumping between buildings, at night, with rain."></textarea>

    <h2>Tipo de imagen</h2>
    <select id="tipo" onchange="actualizarEstilos()">
        <option value="Comic">Comic</option>
        <option value="Realistic photo">Realistic photo</option>
        <option value="Painting">Painting</option>
        <option value="Photography">Photography</option>
        <option value="Landscape">Landscape</option>
        <option value="Illustration">Illustration</option>
        <option value="Pixel art">Pixel art</option>
        <option value="3D render">3D render</option>
        <option value="Watercolor">Watercolor</option>
    </select>

    <h2>Estilo</h2>
    <select id="estilo">
    </select>

    <h2>Formato</h2>
    <select id="formato">
        <option value="9:16">9:16 (vertical)</option>
        <option value="16:9">16:9 (horizontal)</option>
        <option value="1:1">1:1 (square)</option>
    </select>

    <button onclick="crearPrompt()">Create prompt</button>

    <div id="resultado"></div>

    <button id="copiar" style="display:none;" onclick="copiarPrompt()">Copy prompt</button>
    <button id="abrir" style="display:none;" onclick="abrirCopilot()">Open in Copilot</button>

    <h2>Prompt history</h2>
    <div id="historial"></div>

</div>

<footer>
    <p>© 2026 Creador de Prompts – #imagif</p>
    <div class="social-section">
        <p>Sígueme en las siguientes páginas:</p>
        <div class="social-buttons">
            <a href="https://www.youtube.com/channel/UC8m_l7-pDh3W0jnSKNayLLw?sub_confirmation=1" class="social-btn">
                📺 YouTube
            </a>
            <a href="https://imagenesgifs.wixsite.com/paracompartir" class="social-btn">
                🌐 Imagif
            </a>
            <a href="https://ideasdesdetucasa.wixsite.com/ideas" class="social-btn">
                💡 Ideas
            </a>
            <a href="https://es.pinterest.com/imagif55/" class="social-btn">
                📌 Pinterest
            </a>
        </div>
    </div>
</footer>

<script>
let ultimoPrompt = "";

// Mapa de estilos según tipo (en inglés)
const estilosPorTipo = {
    "Comic": [
        "Disney style",
        "Manga style",
        "Anime style",
        "Traditional comic",
        "Kids comic",
        "Superhero comic",
        "American cartoon"
    ],
    "Realistic photo": [
        "High resolution",
        "HDR",
        "Cinematic",
        "Vintage",
        "Black and white",
        "Professional portrait"
    ],
    "Painting": [
        "Renaissance",
        "Impressionist",
        "Baroque",
        "Classical",
        "Oil painting",
        "Artistic watercolor"
    ],
    "Photography": [
        "Professional portrait",
        "Macro",
        "Black and white",
        "Vintage",
        "Cinematic",
        "Documentary"
    ],
    "Landscape": [
        "Fantasy",
        "Realistic",
        "Concept art",
        "Matte painting",
        "Minimalist",
        "Epic"
    ],
    "Illustration": [
        "Digital art",
        "Children's book",
        "Minimalist",
        "Concept art",
        "Soft comic style",
        "Cartoon style"
    ],
    "Pixel art": [
        "Retro 8-bit",
        "Retro 16-bit",
        "Video game style",
        "Minimalist",
        "Chibi pixel",
        "Isometric"
    ],
    "3D render": [
        "Realistic",
        "Pixar style",
        "Video game style",
        "Low poly",
        "High definition",
        "Cinematic"
    ],
    "Watercolor": [
        "Soft",
        "Kids style",
        "Watercolor landscape",
        "Watercolor portrait",
        "Minimalist",
        "Fantasy watercolor"
    ]
};

function actualizarEstilos() {
    const tipo = document.getElementById("tipo").value;
    const estiloSelect = document.getElementById("estilo");
    estiloSelect.innerHTML = "";

    const estilos = estilosPorTipo[tipo] || [];

    estilos.forEach(est => {
        const opt = document.createElement("option");
        opt.value = est;
        opt.textContent = est;
        estiloSelect.appendChild(opt);
    });
}

// Inicializar estilos al cargar
actualizarEstilos();

function crearPrompt() {
    const descripcion = document.getElementById("descripcion").value.trim();
    const tipo = document.getElementById("tipo").value;
    const estilo = document.getElementById("estilo").value;
    const formato = document.getElementById("formato").value;

    if (!descripcion) {
        document.getElementById("resultado").innerHTML = "Please enter a description.";
        return;
    }

    const prompt = `Main description: ${descripcion}

Image type: ${tipo}
Specific style: ${estilo}
Format: ${formato}

Additional instructions:
- Balanced and careful composition.
- Consistent lighting with the scene.
- Well-defined and harmonious colors.
- High level of detail on the main subject.
- Background matching the image type and style.
- Professional quality, suitable for printing or digital use.`;

    ultimoPrompt = prompt;

    document.getElementById("resultado").innerText = prompt;
    document.getElementById("copiar").style.display = "block";
    document.getElementById("abrir").style.display = "block";

    const div = document.createElement("div");
    div.innerText = prompt;
    document.getElementById("historial").prepend(div);
}

function copiarPrompt() {
    navigator.clipboard.writeText(ultimoPrompt);
    alert("Prompt copied!");
}

function abrirCopilot() {
    const url = "https://www.bing.com/images/create?prompt=" + encodeURIComponent(ultimoPrompt);
    window.open(url, "_blank");
}
</script>

</body>
</html>
