<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creador de Imágenes</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #ffeef7;
        margin: 0;
        padding-bottom: 60px;
    }

    header {
        background-color: #1e2851;
        color: #fff;
        text-align: center;
        padding: 10px 0;
        max-width: 850px;
        margin: 0 auto;
        border-radius: 10px;
    }

    .header-buttons {
        display: flex;
        justify-content: center;
        margin-top: 10px;
    }

    .header-buttons a {
        background-color: #ff0000;
        color: #fff;
        padding: 10px 20px;
        font-size: 12px;
        border-radius: 5px;
        text-decoration: none;
    }

    .contenedor {
        max-width: 850px;
        margin: 20px auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
    }

    textarea, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        background-color: #1e2851;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
    }

    #resultado {
        margin-top: 20px;
        text-align: center;
    }

    #resultado img {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 15px;
    }

    footer {
        background-color: #1e2851;
        color: #fff;
        text-align: center;
        padding: 10px 0;
        max-width: 850px;
        margin: 0 auto;
        border-radius: 10px;
    }
</style>
</head>

<body>

<header>
    <h1>Creador de Imágenes</h1>
    <div class="header-buttons">
        <a href="https://imagif.github.io/MI-WEB-DE/">INICIO</a>
    </div>
</header>

<div class="contenedor">

    <h2>Descripción</h2>
    <textarea id="descripcion" placeholder="Ejemplo: Un perrito astronauta volando sobre la luna."></textarea>

    <h2>Tipo de imagen</h2>
    <select id="tipo">
        <option value="retrato">Retrato</option>
        <option value="foto realista">Foto realista</option>
        <option value="paisaje">Paisaje</option>
    </select>

    <h2>Estilo</h2>
    <select id="estilo">
        <option value="disney">Disney</option>
        <option value="anime">Anime</option>
        <option value="manga">Manga</option>
        <option value="clasico">Clásico</option>
        <option value="comic">Cómic</option>
    </select>

    <h2>Formato</h2>
    <select id="formato">
        <option value="9:16">9:16 (vertical)</option>
        <option value="16:9">16:9 (horizontal)</option>
    </select>

    <button onclick="crearImagen()">Crear imagen</button>

    <div id="resultado"></div>

</div>

<footer>
    © 2025 Creador de Imágenes. Todos los derechos reservados.
</footer>

<script>
const API_KEY = ""; 

async function crearImagen() {
    const descripcion = document.getElementById("descripcion").value.trim();
    const tipo = document.getElementById("tipo").value;
    const estilo = document.getElementById("estilo").value;
    const formato = document.getElementById("formato").value;
    const resultado = document.getElementById("resultado");

    if (!descripcion) {
        resultado.innerHTML = "<p>Por favor, escribe una descripción.</p>";
        return;
    }

    const prompt = `${descripcion}. Tipo: ${tipo}. Estilo: ${estilo}. Formato: ${formato}.`;

    resultado.innerHTML = "<p>Generando imagen, espera un momento...</p>";

    // Crear predicción
    const response = await fetch("https://api.replicate.com/v1/predictions", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": `Token ${API_KEY}`
        },
        body: JSON.stringify({
            version: "c1b9c7c8e5a9d4d8b6e8c7f0c2b8a1d8b3f4e5c6c7d8e9f0", 
            input: { prompt: prompt }
        })
    });

    let prediction = await response.json();

    // Esperar a que termine
    while (prediction.status !== "succeeded" && prediction.status !== "failed") {
        await new Promise(r => setTimeout(r, 1500));

        const check = await fetch(`https://api.replicate.com/v1/predictions/${prediction.id}`, {
            headers: { "Authorization": `Token ${API_KEY}` }
        });

        prediction = await check.json();
    }

    if (prediction.status === "succeeded") {
        resultado.innerHTML = `<img src="${prediction.output[0]}" alt="Imagen generada">`;
    } else {
        resultado.innerHTML = "<p>Error al generar la imagen.</p>";
    }
}
</script>

</body>
</html>
