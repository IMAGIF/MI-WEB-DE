<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Creador de Imágenes Gratis</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #ffeef7;
        margin: 0;
        padding-bottom: 60px;
    }

    header {
        background-color: #1e2851;
        color: #fff;
        text-align: center;
        padding: 10px 0;
        max-width: 850px;
        margin: 0 auto;
        border-radius: 10px;
    }

    .contenedor {
        max-width: 850px;
        margin: 20px auto;
        background: #ffffff;
        padding: 20px;
        border-radius: 10px;
    }

    textarea, select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 14px;
    }

    button {
        background-color: #1e2851;
        color: white;
        padding: 12px 20px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        width: 100%;
        font-size: 16px;
    }

    #resultado {
        margin-top: 20px;
        text-align: center;
    }

    #resultado img {
        max-width: 100%;
        border-radius: 10px;
        margin-top: 15px;
    }

    footer {
        background-color: #1e2851;
        color: #fff;
        text-align: center;
        padding: 10px 0;
        max-width: 850px;
        margin: 0 auto;
        border-radius: 10px;
    }
</style>
</head>

<body>

<header>
    <h1>Creador de Imágenes Gratis</h1>
</header>

<div class="contenedor">

    <h2>Descripción</h2>
    <textarea id="descripcion" placeholder="Ejemplo: Superhéroe estilo cómic saltando entre edificios."></textarea>

    <h2>Tipo de imagen</h2>
    <select id="tipo">
        <option value="retrato">Retrato</option>
        <option value="foto realista">Foto realista</option>
        <option value="paisaje">Paisaje</option>
    </select>

    <h2>Estilo</h2>
    <select id="estilo">
        <option value="comic">Cómic</option>
        <option value="anime">Anime</option>
        <option value="manga">Manga</option>
        <option value="clasico">Clásico</option>
        <option value="disney">Disney</option>
    </select>

    <h2>Formato</h2>
    <select id="formato">
        <option value="9:16">9:16 (vertical)</option>
        <option value="16:9">16:9 (horizontal)</option>
    </select>

    <button onclick="crearImagen()">Crear imagen</button>

    <div id="resultado"></div>

</div>

<footer>
    © 2025 Creador de Imágenes Gratis.
</footer>

<script>
async function crearImagen() {
    const descripcion = document.getElementById("descripcion").value.trim();
    const tipo = document.getElementById("tipo").value;
    const estilo = document.getElementById("estilo").value;
    const formato = document.getElementById("formato").value;
    const resultado = document.getElementById("resultado");

    if (!descripcion) {
        resultado.innerHTML = "<p>Por favor, escribe una descripción.</p>";
        return;
    }

    const prompt = `${descripcion}. Tipo: ${tipo}. Estilo: ${estilo}. Formato: ${formato}.`;

    resultado.innerHTML = "<p>Generando imagen, espera un momento...</p>";

    const response = await fetch(
        "https://black-forest-labs-flux-1-schnell.hf.space/run/predict",
        {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ data: [prompt] })
        }
    );

    const result = await response.json();

    if (result && result.data && result.data[0]) {
        const imagen = result.data[0].url || result.data[0];
        resultado.innerHTML = `<img src="${imagen}" alt="Imagen generada">`;
    } else {
        resultado.innerHTML = "<p>Error al generar la imagen.</p>";
    }
}
</script>

</body>
</html>
